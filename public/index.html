<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e8c547">
<title>Platte Dak Analyse</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #242424;
    --border: #2e2e2e; --accent: #e8c547; --accent2: #ff6b35;
    --text: #f0ece0; --muted: #777; --green: #4caf7d; --red: #e05252;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; max-width: 680px; margin: 0 auto; padding: 20px 16px 40px; }
  header { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
  .header-top { display: flex; align-items: center; justify-content: space-between; }
  .logo-row { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
  .subtitle { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; }
  .global-lang { display: flex; gap: 3px; }
  .global-lang button { padding: 6px 14px; font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--muted); transition: all 0.15s; }
  .global-lang button.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .upload-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 36px 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--surface); position: relative; margin-bottom: 16px; }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: #1c1a0f; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 40px; margin-bottom: 10px; }
  .upload-text { font-family: 'Syne', sans-serif; font-size: 15px; margin-bottom: 4px; }
  .upload-sub { font-size: 11px; color: var(--muted); }
  .camera-btn { display: none; width: 100%; padding: 12px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-family: 'Syne', sans-serif; font-size: 13px; cursor: pointer; margin-bottom: 16px; text-align: center; }
  @media (max-width: 600px) { .camera-btn { display: block; } .upload-sub { display: none; } }
  #preview-wrap { display: none; margin-bottom: 16px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); position: relative; }
  #preview-img { width: 100%; max-height: 260px; object-fit: cover; display: block; }
  .preview-badge { position: absolute; top: 10px; right: 10px; background: var(--accent); color: #000; font-size: 10px; font-family: 'Syne', sans-serif; font-weight: 700; padding: 3px 8px; border-radius: 3px; text-transform: uppercase; }
  .change-photo { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: var(--text); font-size: 10px; font-family: 'Syne', sans-serif; padding: 4px 10px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border); }
  .btn { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; margin-bottom: 20px; }
  .btn:hover { background: #f5d45a; }
  .btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .loading { display: none; text-align: center; padding: 32px; color: var(--muted); font-size: 12px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { display: none; background: #1a0f0f; border: 1px solid var(--red); border-radius: 8px; padding: 14px; font-size: 12px; color: var(--red); margin-bottom: 16px; }
  .section-head { font-family: 'Syne', sans-serif; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin: 24px 0 10px; border-left: 2px solid var(--accent); padding-left: 8px; }
  .result-grid { display: none; flex-direction: column; gap: 2px; }
  .result-row { display: grid; grid-template-columns: 130px 1fr; background: var(--surface); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  @media (max-width: 480px) { .result-row { grid-template-columns: 1fr; } }
  .result-label { background: var(--surface2); padding: 10px 12px; font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); display: flex; align-items: flex-start; padding-top: 12px; }
  .result-value { padding: 10px 14px; font-size: 12px; line-height: 1.65; color: var(--text); }
  .result-value.accent { color: var(--accent); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; }
  .result-value.risk { color: var(--accent2); }
  .result-value.conform { color: #4caf7d; }
  .result-value.norma { color: var(--green); font-size: 11px; }
  .export-btn { display: none; margin-top: 16px; width: 100%; padding: 11px; background: transparent; color: var(--accent); border: 1px solid var(--accent); border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.15s; }
  .export-btn:hover { background: var(--accent); color: #000; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-row">
      <div class="logo-icon">🏠</div>
      <h1>Platte Dak Analyse</h1>
    </div>
    <div class="global-lang">
      <button onclick="setLang('NL')" id="btn-NL" class="active">NL</button>
      <button onclick="setLang('PL')" id="btn-PL">PL</button>
      <button onclick="setLang('EN')" id="btn-EN">EN</button>
    </div>
  </div>
  <div class="subtitle" id="subtitle">AI · Technische dakanalyse · v1.0</div>
</header>

<div class="upload-zone" id="dropzone">
  <input type="file" id="file-input" accept="image/*">
  <div class="upload-icon">📷</div>
  <div class="upload-text" id="upload-text">Gooi een dakfoto hier</div>
  <div class="upload-sub">PNG, JPG, WEBP</div>
</div>

<label class="camera-btn" for="camera-input">
  📸 <span id="camera-text">Maak een foto</span>
  <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">
</label>

<div id="preview-wrap">
  <img id="preview-img" src="" alt="">
  <div class="preview-badge" id="badge-text">✓ klaar</div>
  <label class="change-photo" for="file-input" id="change-text">foto wijzigen</label>
</div>

<button class="btn" id="analyze-btn" disabled>⚡ <span id="btn-text">Analyseer foto</span></button>
<div class="error-box" id="error-box"></div>
<div class="loading" id="loading">
  <div class="spinner"></div>
  <span id="loading-text">Analyseren... even geduld</span>
</div>
<div class="result-grid" id="result-grid"></div>
<button class="export-btn" id="export-btn">⬇ <span id="export-text">Exporteer CSV</span></button>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});

const T = {
  NL: {
    subtitle: 'AI · Technische dakanalyse · v1.0',
    upload: 'Gooi een dakfoto hier',
    camera: 'Maak een foto',
    badge: '✓ klaar',
    change: 'foto wijzigen',
    btn: 'Analyseer foto',
    loading: 'Analyseren... even geduld',
    export: 'Exporteer CSV',
    sec_tech: 'Technische analyse',
    sec_desc: 'Beschrijving',
    l_systeem: 'Systeem', l_onder: 'Onderbouw', l_mat: 'Materiaal',
    l_conform: 'Conform normen',
    l_detail: 'Detail', l_norm: 'Normen', l_risk: 'Risico'
  },
  PL: {
    subtitle: 'AI · Techniczna analiza dachu · v1.0',
    upload: 'Wrzuć zdjęcie dachu',
    camera: 'Zrób zdjęcie',
    badge: '✓ gotowe',
    change: 'zmień zdjęcie',
    btn: 'Analizuj zdjęcie',
    loading: 'Analizuję... chwilę',
    export: 'Eksportuj CSV',
    sec_tech: 'Analiza techniczna',
    sec_desc: 'Opis',
    l_systeem: 'System', l_onder: 'Podkonstrukcja', l_mat: 'Materiał',
    l_conform: 'Zgodność z normami',
    l_detail: 'Detal', l_norm: 'Normy', l_risk: 'Ryzyko'
  },
  EN: {
    subtitle: 'AI · Technical roof analysis · v1.0',
    upload: 'Drop a roof photo here',
    camera: 'Take a photo',
    badge: '✓ ready',
    change: 'change photo',
    btn: 'Analyse photo',
    loading: 'Analysing... please wait',
    export: 'Export CSV',
    sec_tech: 'Technical analysis',
    sec_desc: 'Description',
    l_systeem: 'System', l_onder: 'Structure', l_mat: 'Material',
    l_conform: 'Compliant with standards',
    l_detail: 'Detail', l_norm: 'Standards', l_risk: 'Risk'
  }
};

let activeLang = 'NL';
let lastResult = null;
let base64Data = null;
let mediaTypeStored = 'image/jpeg';

function setLang(lang) {
  activeLang = lang;
  ['NL','PL','EN'].forEach(l => document.getElementById('btn-'+l).classList.toggle('active', l === lang));
  const t = T[lang];
  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('upload-text').textContent = t.upload;
  document.getElementById('camera-text').textContent = t.camera;
  document.getElementById('badge-text').textContent = t.badge;
  document.getElementById('change-text').textContent = t.change;
  document.getElementById('btn-text').textContent = t.btn;
  document.getElementById('loading-text').textContent = t.loading;
  document.getElementById('export-text').textContent = t.export;
  if (lastResult) renderResult(lastResult);
}

const fileInput = document.getElementById('file-input');
const cameraInput = document.getElementById('camera-input');
const dropzone = document.getElementById('dropzone');
const previewWrap = document.getElementById('preview-wrap');
const previewImg = document.getElementById('preview-img');
const analyzeBtn = document.getElementById('analyze-btn');
const loading = document.getElementById('loading');
const resultGrid = document.getElementById('result-grid');
const exportBtn = document.getElementById('export-btn');
const errorBox = document.getElementById('error-box');

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });
cameraInput.addEventListener('change', () => { if (cameraInput.files[0]) handleFile(cameraInput.files[0]); });

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX_DIM = 2000;
      let { width, height } = img;
      if (width > MAX_DIM || height > MAX_DIM) {
        if (width > height) {
          height = Math.round(height * (MAX_DIM / width));
          width = MAX_DIM;
        } else {
          width = Math.round(width * (MAX_DIM / height));
          height = MAX_DIM;
        }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      mediaTypeStored = 'image/jpeg';
      base64Data = dataUrl.split(',')[1];
      previewImg.src = dataUrl;
      previewWrap.style.display = 'block';
      analyzeBtn.disabled = false;
      resultGrid.style.display = 'none';
      exportBtn.style.display = 'none';
      errorBox.style.display = 'none';
      lastResult = null;
    };
    img.onerror = () => {
      errorBox.textContent = '❌ Nie można wczytać zdjęcia';
      errorBox.style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

analyzeBtn.addEventListener('click', async () => {
  if (!base64Data) return;
  errorBox.style.display = 'none';
  loading.style.display = 'block';
  resultGrid.style.display = 'none';
  exportBtn.style.display = 'none';
  analyzeBtn.disabled = true;
  try {
    const response = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: base64Data, mediaType: mediaTypeStored })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Server error');
    lastResult = data;
    renderResult(data);
  } catch(err) {
    errorBox.textContent = '❌ ' + err.message;
    errorBox.style.display = 'block';
  } finally {
    loading.style.display = 'none';
    analyzeBtn.disabled = false;
  }
});

function renderResult(d) {
  const t = T[activeLang];
  const L = activeLang;
  resultGrid.innerHTML = '';

  const techHead = document.createElement('div');
  techHead.className = 'section-head';
  techHead.textContent = t.sec_tech;
  resultGrid.appendChild(techHead);

  [
    { label: t.l_systeem, key: `Systeem_${L}`, cls: 'accent' },
    { label: t.l_onder,   key: `Onder_${L}`,   cls: '' },
    { label: t.l_mat,     key: `Materiaal_${L}`,cls: '' },
    { label: t.l_detail,  key: `Detail_${L}`,   cls: '' },
    { label: t.l_norm,    key: `Normen_${L}`,      cls: 'norma' },
    { label: t.l_conform, key: `Conformiteit_${L}`, cls: 'conform' },
    { label: t.l_risk,    key: `Risico_${L}`,   cls: 'risk' },
  ].forEach(r => addRow(r.label, d[r.key] || '—', r.cls));

  const descHead = document.createElement('div');
  descHead.className = 'section-head';
  descHead.textContent = t.sec_desc;
  resultGrid.appendChild(descHead);

  const descRow = document.createElement('div');
  descRow.className = 'result-row';
  descRow.innerHTML = `<div class="result-value" style="grid-column:1/-1;padding:14px">${d[`Beschrijving_${L}`] || '—'}</div>`;
  resultGrid.appendChild(descRow);

  resultGrid.style.display = 'flex';
  exportBtn.style.display = 'block';
}

function addRow(label, value, cls) {
  const row = document.createElement('div');
  row.className = 'result-row';
  row.innerHTML = `<div class="result-label">${label}</div><div class="result-value ${cls}">${value}</div>`;
  resultGrid.appendChild(row);
}

exportBtn.addEventListener('click', () => {
  if (!lastResult) return;
  const keys = Object.keys(lastResult);
  const vals = keys.map(k => `"${(lastResult[k]||'').replace(/"/g,'""')}"`);
  const csv = keys.join(';') + '\n' + vals.join(';');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pda_analyse_${Date.now()}.csv`;
  a.click();
});
</script>
</body>
</html>
